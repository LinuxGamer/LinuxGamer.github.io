<!DOCTYPE html>
<html>
	<head>
		<title>presence</title>
        <link rel="stylesheet" href="https://use.typekit.net/cdf2mdr.css">
        <style>
            body {
                height: 100vh;
                margin: 0;
                overflow: hidden;
                background-color: rgb(34, 34, 34);
            }
            
           .centered {
                display: flex;
                height: 100%;
                justify-content: center;
                align-items: center;
            }
            
            div#id01 {
                color: #f6f6f6;
                font-family: Lato;
            }
            
            div#id01 > h1 {
                font-family: "Lato Black";
            }
            
            div#id01 > p {
                font-family: "Lato Hairline";
                font-style: italic;
            }
            
        </style>
	</head>
<body>
    <center class="centered">
        <div id="id01"></div>
    </center>
    <script>
        const updateIntervalInSeconds = 10;
        function tick() {
            const xmlhttp = new XMLHttpRequest();
            const url = "https://api.lanyard.rest/v1/users/422274807732633604";
    
            xmlhttp.onreadystatechange = function () {
                if (this.readyState == 4 && this.status == 200) {
                    const response = JSON.parse(this.responseText);
                    updateActivity(response);
                }
            };
            xmlhttp.open("GET", url, true);
            xmlhttp.send();
    
            function updateActivity(response) {
                const { activities, discord_user: user } = response.data;
                const osuActivity = activities.filter((v) => v.application_id === "367827983903490050")[0];
                const root = document.getElementById("id01");
                const name = document.createElement("h1");
                name.innerText = user.username;
                const activityName = document.createElement("h3");
                activityName.innerText = osuActivity ? "osu!" : "Just chatting";
                const activityDetails = document.createElement("h4");
                activityDetails.innerText = osuActivity?.details || "";
                const activityState = document.createElement("p");
                activityState.innerText = osuActivity?.state || "Idle";
                root.innerHTML = "";
                root.appendChild(name);
                root.appendChild(activityName);
                root.appendChild(activityDetails);
                root.appendChild(activityState);
            }
        }
        tick();
        setInterval(tick, updateIntervalInSeconds * 1000);
    </script>
</body>

</html>
